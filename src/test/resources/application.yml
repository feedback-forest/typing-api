spring:
  config:
    import:
      - optional:classpath:/application-secret.yml

  # DB Config
  datasource:
    url: jdbc:h2:mem:test
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # JPA Config
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  # Redis Config
  data:
    redis:
      host: localhost
      port: 6379

  # Spring Security OAuth2, Client
  security:
    oauth2:
      client:
        provider:
          kakao:
            authorization-uri: ${oauth2.authorization-url}
            token-uri: ${oauth2.token-url}
            user-info-uri: ${oauth2.user-info-uri}
            jwk-set-uri: ${oauth2.oidc-jwk-set-uri}
            user-name-attribute: sub
        registration:
          kakao:
            authorization-grant-type: ${oauth2.grant-type}
            redirect-uri: ${oauth2.login-redirect-uri}
            client-name: Kakao
            client-authentication-method: client_secret_post
            client-id: ${oauth2.rest-api-key}
            client-secret: ${oauth2.client-secret-key}
            scope:
              - openid              # OIDC
              - name                # 이름
              - profile_nickname    # 닉네임
              - account_email       # 카카오계정(이메일)

  # Jwt Config
  jwt:
    secret: ${jwt.secret-key}

front:
  server: localhost:8080

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql: TRACE